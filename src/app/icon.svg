<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <!--
    Divinely Seeded — Sprout Icon Mark
    Teal: #83CAC4  |  Gold: #AF9944
  -->

  <!-- Stem -->
  <path d="M60,150 C60,124 46,112 46,88 C46,64 60,52 60,22"
        fill="none" stroke="#AF9944" stroke-width="6" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M58,90 C44,70 18,66 14,50 C30,44 56,62 58,90 Z"
        fill="#AF9944"/>

  <!-- Right leaf -->
  <path d="M60,68 C76,48 102,44 106,28 C90,22 64,40 60,68 Z"
        fill="#AF9944"/>

  <!-- Berry -->
  <circle cx="60" cy="20" r="11" fill="#AF9944"/>

  <!-- Teal highlight ring on berry -->
  <circle cx="60" cy="20" r="8" fill="none" stroke="#83CAC4" stroke-width="2" opacity="0.7"/>
</svg>
